<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restart Computer — Онлайн-визитка</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url(backgraund.jpg);
            background-size: cover;
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 30px 20px;
            
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            
            background: transparent; 
            border-radius: 50%;
            border: 2px solid #3b82f6; 
            
            margin: 0 auto 15px;
            
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); 
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 50%; 
        }

        .avatar::before,
        .avatar::after {
            display: none !important;
            content: none !important;
        }

        .profile h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #f8fafc;
        }

        .profile .subtitle {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.5;
            margin-bottom: 5px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            margin-bottom: 40px;
        }

        .link-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .link-btn:hover {
            background-color: #334155;
            transform: translateY(-2px);
            border-color: #475569;
        }

        .link-btn.primary {
            background: #3b82f6;
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .link-btn.primary:hover {
            background: #2563eb;
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
        }

        /* Стили для всплывающего окна (модалки) выбора номеров */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        /* Класс активации всплывающего окна */
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-box h3 {
            font-size: 18px;
            color: #f8fafc;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-phone-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            margin-bottom: 12px;
            background: #3b82f6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.2s;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }

        .modal-phone-btn:hover {
            background: #2563eb;
        }

        .modal-close-btn {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            background: #334155;
            color: #f8fafc;
        }

        .footer {
            width: 100%;
            margin-top: auto;
            text-align: center;
        }

        .footer p {
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="profile">
            <div class="avatar">
                <img src="logo.jpg" alt="Логотип Restart">
            </div>
            <h1>Restart</h1>
            <p class="subtitle" style="font-weight: bold;">Компьютерный магазин и комплектующие.</p>
            <p class="subtitle" style="font-weight: bold;">Соберем ПК твоей мечты! 💻🛠️</p>
        </header>

        <main class="links-container">
            
            <a href="http://restart.com.tm/index.php?route=product/category&path=1" target="_blank" class="link-btn primary">
                <i class="fa-solid fa-store"></i> Каталог товаров
            </a>

            <a href="https://www.instagram.com/computersrestart?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="link-btn primary">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            
            <a href="https://www.tiktok.com/@restart.computer?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn primary">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </a>

            <a href="https://imo.to/p/99361966688" target="_blank" class="link-btn primary">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: inline-block; vertical-align: middle;">
                    <mask id="imo-mask">
                        <rect width="24" height="24" fill="white" />
                        
                        <text x="12" y="15.5" font-family="'Segoe UI', Arial, sans-serif" font-weight="950" font-size="10" fill="black" text-anchor="middle" letter-spacing="-0.3">imo</text>
                    </mask>
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 2.055.62 3.966 1.69 5.56L2.12 21.6c-.23.57.34 1.14.91.91l4.04-1.57C8.67 21.65 10.28 22 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" fill="currentColor" mask="url(#imo-mask)"/>
                </svg> IMO
            </a>
            
            <a href="https://imo.im/u/imoid_mbDvmlzj3k" id="openCallModal" class="link-btn primary">
                <i class="fa-solid fa-phone"></i> Позвонить
            </a>

            <a href="https://maps.app.goo.gl/MzH9MMyMpDYmfy5r5" target="_blank" class="link-btn primary">
                <i class="fa-solid fa-location-dot"></i> Как нас найти (Карта)
            </a>

        </main>

        <footer class="footer">
            <br><br>
            <p>© 2026 Restart Computer. Все права защищены.</p>
        </footer>
    </div>

    
    <div id="callModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Выберите номер для звонка</h3>
            
          
            <a href="tel:+99364047503" class="modal-phone-btn">
                <i class="fa-solid fa-phone"></i> +993 64 047503
            </a>
            
            <a href="tel:+99361966688" class="modal-phone-btn">
                <i class="fa-solid fa-phone"></i> +993 61 966688
            </a>
            
          
            <button id="closeCallModal" class="modal-close-btn">Отмена</button>
        </div>
    </div>
    <script>
        const callModal = document.getElementById('callModal');
        const openCallModalBtn = document.getElementById('openCallModal');
        const closeCallModalBtn = document.getElementById('closeCallModal');

        // Открытие модального окна
        openCallModalBtn.addEventListener('click', function(event) {
            event.preventDefault(); // Запрещаем стандартный переход по ссылке
            callModal.classList.add('active');
        });

        // Закрытие модального окна кнопкой "Отмена"
        closeCallModalBtn.addEventListener('click', function() {
            callModal.classList.remove('active');
        });

        // Закрытие кликом по затемненной области вне окна
        window.addEventListener('click', function(event) {
            if (event.target === callModal) {
                callModal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
